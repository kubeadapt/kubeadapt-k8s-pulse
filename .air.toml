# Air configuration for hot reload during development
# NOTE: BPF files are pre-generated and committed. Only regenerate when changing bpf/*.c files.
# To regenerate BPF: run `make generate` (on macOS) or `make generate-native` (on Linux)
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Build Go binary directly (BPF files already generated)
  # Skips generate+lint for faster hot reload
  # IMPORTANT: Does NOT run go generate - BPF files are pre-compiled
  cmd = "mkdir -p bin && CGO_ENABLED=0 go build -v -o bin/kubeadapt-k8s-pulse ./cmd/agent"
  # Binary file yields from `cmd`.
  bin = "bin/kubeadapt-k8s-pulse"
  # No sudo needed - container is already privileged
  full_bin = "bin/kubeadapt-k8s-pulse"
  # Watch these filename extensions.
  # NOTE: Excludes .c and .h files - BPF programs are pre-compiled
  # If you change BPF C code, run `make generate` manually
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", ".git", "bin", ".github", "deployments", "configs", "scripts", "bpf"]
  # Watch these directories if you specified.
  include_dir = ["cmd", "internal"]
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  # Exclude generated BPF files and test files
  exclude_regex = ["_test\\.go", "_bpfel\\.go", "_bpfeb\\.go", "\\.o$", "\\.c$", "\\.h$"]
  # Exclude unchanged files.
  exclude_unchanged = false
  # Follow symlinks
  follow_symlink = false
  # This log file places in your tmp_dir.
  log = "build-errors.log"
  # It's not necessary to trigger build each time when file changed.
  delay = 1000
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process (windows does not support this feature)
  send_interrupt = true
  # Delay after sending Interrupt signal
  kill_delay = 500 # ms
  # Add additional arguments when running binary (bin/full_bin). Will run './bin/kubeadapt-k8s-pulse $args'.
  args_bin = []

[color]
  # Customize each part's color. If no color is set, use the raw terminal color.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  # Show log time
  time = true

[misc]
  # Delete tmp directory on exit
  clean_on_exit = false