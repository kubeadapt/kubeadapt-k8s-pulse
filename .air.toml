***REMOVED*** Air configuration for hot reload during development
***REMOVED*** NOTE: BPF files are pre-generated and committed. Only regenerate when changing bpf/*.c files.
***REMOVED*** To regenerate BPF: run `make generate` (on macOS) or `make generate-native` (on Linux)
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  ***REMOVED*** Build Go binary directly (BPF files already generated)
  ***REMOVED*** Skips generate+lint for faster hot reload
  cmd = "mkdir -p bin && CGO_ENABLED=0 go build -v -o bin/ebpf-agent ./cmd/agent"
  ***REMOVED*** Binary file yields from `cmd`.
  bin = "bin/ebpf-agent"
  ***REMOVED*** No sudo needed - container is already privileged
  full_bin = "bin/ebpf-agent"
  ***REMOVED*** Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "c", "h"]
  ***REMOVED*** Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", ".git", "bin", ".github", "deployments", "configs", "scripts"]
  ***REMOVED*** Watch these directories if you specified.
  include_dir = ["cmd", "internal", "bpf"]
  ***REMOVED*** Exclude files.
  exclude_file = []
  ***REMOVED*** Exclude specific regular expressions.
  exclude_regex = ["_test\\.go", "_bpfel\\.go", "_bpfeb\\.go", "\\.o$"]
  ***REMOVED*** Exclude unchanged files.
  exclude_unchanged = false
  ***REMOVED*** Follow symlinks
  follow_symlink = false
  ***REMOVED*** This log file places in your tmp_dir.
  log = "build-errors.log"
  ***REMOVED*** It's not necessary to trigger build each time when file changed.
  delay = 1000
  ***REMOVED*** Stop running old binary when build errors occur.
  stop_on_error = true
  ***REMOVED*** Send Interrupt signal before killing process (windows does not support this feature)
  send_interrupt = true
  ***REMOVED*** Delay after sending Interrupt signal
  kill_delay = 500 ***REMOVED*** ms
  ***REMOVED*** Add additional arguments when running binary (bin/full_bin). Will run './bin/ebpf-agent $args'.
  args_bin = []

[color]
  ***REMOVED*** Customize each part's color. If no color is set, use the raw terminal color.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  ***REMOVED*** Show log time
  time = true

[misc]
  ***REMOVED*** Delete tmp directory on exit
  clean_on_exit = false