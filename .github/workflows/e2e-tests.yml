name: Pull Request - E2E Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'test/e2e/**'
      - 'test/integration/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Build BPF builder image (with cache)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile.bpf-builder
          tags: kubeadapt/bpf-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run integration tests in Docker
        run: make test-integration-docker

  e2e-tests:
    name: E2E Tests (Kind Cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.25'
          cache: true

      # Install clang-format for C code linting
      # E2E tests run on host (not in container) because Kind cluster needs Docker access
      # make test-e2e-ci -> build-for-e2e -> lint -> requires clang-format
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Build BPF builder image (with cache)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile.bpf-builder
          tags: kubeadapt/bpf-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      # Generate BPF binaries before E2E tests
      # Uses BPF_MAP_SIZE=1000 for overflow testing
      - name: Generate BPF binaries for E2E tests
        run: |
          docker run --rm -v "$(pwd)":/workspace -w /workspace \
            -e BPF_MAP_SIZE=1000 \
            kubeadapt/bpf-builder:latest \
            make generate-native

      - name: Run E2E tests (CI mode - no BPF restoration)
        run: make test-e2e-ci-nobpf
        # Makefile target handles:
        # - Building image with BPF_MAP_SIZE=1000 (enables overflow testing)
        # - Creating Kind cluster (requires Docker on host)
        # - Loading image to Kind
        # - Running all E2E tests
        # - NO BPF restoration (CI is stateless)
        # - Cleanup

      - name: Export Kind cluster logs
        if: always()
        run: |
          CLUSTER_NAME=$(kind get clusters 2>/dev/null | head -n1 || echo "")
          if [ ! -z "$CLUSTER_NAME" ]; then
            kind export logs e2e-logs --name "$CLUSTER_NAME" || true
          fi

      - name: Upload E2E test logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-logs
          path: e2e-logs
          retention-days: 7
