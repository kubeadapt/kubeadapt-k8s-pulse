name: Pull Request - E2E Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'test/e2e/**'
      - 'test/integration/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build BPF builder image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bpf-builder
          tags: kubeadapt/bpf-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run integration tests in Docker
        run: make test-integration-docker

  e2e-tests:
    name: E2E Tests (Kind Cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      ***REMOVED*** Install clang-format for C code linting
      ***REMOVED*** E2E tests run on host (not in container) because Kind cluster needs Docker access
      ***REMOVED*** make test-e2e-ci -> build-for-e2e -> lint -> requires clang-format
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format

      - name: Run E2E tests (CI mode - no BPF restoration)
        run: make test-e2e-ci
        ***REMOVED*** Makefile target handles:
        ***REMOVED*** - Building image with BPF_MAP_SIZE=1000 (enables overflow testing)
        ***REMOVED*** - Creating Kind cluster (requires Docker on host)
        ***REMOVED*** - Loading image to Kind
        ***REMOVED*** - Running all E2E tests
        ***REMOVED*** - NO BPF restoration (CI is stateless)
        ***REMOVED*** - Cleanup

      - name: Export Kind cluster logs
        if: always()
        run: |
          CLUSTER_NAME=$(kind get clusters 2>/dev/null | head -n1 || echo "")
          if [ ! -z "$CLUSTER_NAME" ]; then
            kind export logs e2e-logs --name "$CLUSTER_NAME" || true
          fi

      - name: Upload E2E test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-logs
          path: e2e-logs
          retention-days: 7
