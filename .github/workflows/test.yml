name: Pull Request Checks

on:
  pull_request:
    branches: [ '*' ]
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install make
        run: sudo apt-get install -y make

      - name: Run verification and tests
        run: make lint test test-coverage

      - name: Check clean generate
        run: make generate && git add -A && git diff HEAD --exit-code

      - name: Report coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install make
        run: sudo apt-get install -y make

      - name: Run integration tests in Docker
        run: make test-docker

  e2e-tests:
    name: E2E Tests (Kind Cluster)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make clang llvm

      - name: Run E2E tests
        run: make test-e2e
        timeout-minutes: 35

      - name: Export Kind cluster logs
        if: always()
        run: |
          CLUSTER_NAME=$(kind get clusters | head -n1)
          if [ ! -z "$CLUSTER_NAME" ]; then
            kind export logs e2e-logs --name "$CLUSTER_NAME" || true
          fi

      - name: Upload E2E test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-logs
          path: e2e-logs
          retention-days: 7

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-fmt json -out gosec-report.json ./...'
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  ***REMOVED*** Build eBPF artifacts once for kernel compatibility testing
  build-ebpf-artifacts:
    name: Build eBPF Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    ***REMOVED*** Only run on PRs to main branch
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev gcc make

      - name: Generate and build with Makefile
        run: |
          make generate
          make build

      - name: Package artifacts
        run: |
          tar czf /tmp/ebpf-agent-build.tar.gz \
            internal/ \
            bin/ \
            bpf/ \
            cmd/ \
            go.mod \
            go.sum

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-agent-build
          path: /tmp/ebpf-agent-build.tar.gz
          retention-days: 5

  ***REMOVED*** Test eBPF programs across multiple kernel versions
  kernel-compatibility:
    name: Test eBPF on ${{ matrix.kernel }}
    needs: build-ebpf-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  ***REMOVED*** Test all kernels even if one fails
      matrix:
        kernel:
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - '5.10-20250623.013300'
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - '5.15-20250623.013300'
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - '6.1-20250623.013300'
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - '6.6-20250623.013300'
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - 'bpf-next-20251008.075427'
          ***REMOVED*** renovate: datasource=docker depName=quay.io/lvh-images/kind
          - 'rhel8.9-20250616.013250'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ebpf-agent-build

      - name: Extract build artifacts
        run: tar xzf ebpf-agent-build.tar.gz

      - name: Test eBPF loading on kernel ${{ matrix.kernel }}
        uses: cilium/little-vm-helper@v0.0.27
        with:
          test-name: ebpf-kernel-test
          image: kind
          image-version: ${{ matrix.kernel }}
          host-mount: .
          cpu: 2
          mem: 4G
          install-dependencies: 'true'
          cmd: |
            set -eux

            cd /host

            echo "=== Kernel Information ==="
            uname -r

            echo ""
            echo "=== Verifying eBPF Support ==="
            mount | grep bpf || echo "BPF not mounted"
            ls -la /sys/fs/bpf/ || true

            echo ""
            echo "=== Testing eBPF Program Verifier Compatibility ==="

            ***REMOVED*** Determine architecture for correct .o file
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then
              BPF_OBJ="internal/bpf/network_x86_bpfel.o"
            elif [ "$ARCH" = "aarch64" ]; then
              BPF_OBJ="internal/bpf/network_arm64_bpfel.o"
            else
              echo "Unsupported architecture: $ARCH"
              exit 1
            fi

            echo "Using eBPF object: $BPF_OBJ"
            ls -lh "$BPF_OBJ"

            ***REMOVED*** Test verifier acceptance with bpftool
            ***REMOVED*** NOTE: This tests basic verifier compatibility
            ***REMOVED*** Full loader testing (with offset detection) happens in E2E tests
            echo ""
            echo "Loading eBPF program through verifier..."
            if bpftool prog load "$BPF_OBJ" /sys/fs/bpf/kubeadapt_test type kprobe 2>&1 | tee /tmp/bpftool.log; then
              echo "✓ eBPF program passed verifier"

              echo ""
              echo "=== Loaded Programs ==="
              bpftool prog show pinned /sys/fs/bpf/kubeadapt_test || true

              ***REMOVED*** Cleanup
              rm -f /sys/fs/bpf/kubeadapt_test
            else
              echo "✗ eBPF program failed verifier"
              echo ""
              echo "=== Verifier Output ==="
              cat /tmp/bpftool.log
              echo ""
              echo "=== Kernel Messages ==="
              dmesg | tail -50 | grep -i "bpf\|verifier" || echo "No BPF messages"
              exit 1
            fi

            echo ""
            echo "✅ Kernel ${{ matrix.kernel }} compatibility verified"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-results-${{ matrix.kernel }}
          path: |
            /var/log/messages
            /var/log/kern.log
          retention-days: 5

  ***REMOVED*** Cleanup artifacts after successful tests
  cleanup-artifacts:
    name: Cleanup Build Artifacts
    needs: [kernel-compatibility]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Delete build artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: ebpf-agent-build