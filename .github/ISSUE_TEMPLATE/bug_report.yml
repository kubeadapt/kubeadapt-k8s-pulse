name: Bug Report
description: Report a bug or unexpected behavior in the eBPF Agent
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - ugurcancaykara

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible to help us diagnose the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Deploy agent with config...
        2. Generate traffic...
        3. Check metrics...
        4. See error
    validations:
      required: true

  - type: dropdown
    id: kernel
    attributes:
      label: Kernel Version
      description: What kernel version are you running? (check with `uname -r`)
      options:
        - "5.10.x"
        - "5.15.x"
        - "6.1.x"
        - "6.6.x"
        - "6.8.x or newer"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform Architecture
      description: What CPU architecture?
      options:
        - "amd64 (x86_64)"
        - "arm64 (aarch64)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Node Operating System
      description: What OS is running on the node? (e.g., Ubuntu 22.04, Amazon Linux 2023, RHEL 8.9)
      placeholder: "Ubuntu 22.04 LTS"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      description: What Kubernetes version? (check with `kubectl version`)
      placeholder: "1.29.0"
    validations:
      required: true

  - type: input
    id: agent-version
    attributes:
      label: Agent Version / Image Tag
      description: What version of the eBPF agent are you using?
      placeholder: "v1.0.0 or main-abc1234"
    validations:
      required: true

  - type: input
    id: collection-interval
    attributes:
      label: Collection Interval
      description: What is the EBPF_COLLECTION_INTERVAL? (default 25s)
      placeholder: "25s"
    validations:
      required: false

  - type: textarea
    id: agent-logs
    attributes:
      label: Agent Logs
      description: |
        Please include relevant logs from the eBPF agent.
        Run: `kubectl logs -n <namespace> <ebpf-agent-pod> --tail=100`
      render: shell
      placeholder: |
        Paste agent logs here...
    validations:
      required: false

  - type: textarea
    id: dmesg
    attributes:
      label: Kernel/BPF Logs (dmesg)
      description: |
        If this is a BPF loading issue, include relevant dmesg output.
        Run: `dmesg | grep -i "bpf\|verifier" | tail -50`
      render: shell
      placeholder: |
        Paste dmesg output here...
    validations:
      required: false

  - type: textarea
    id: metrics
    attributes:
      label: Prometheus Metrics Output
      description: |
        If this is a metrics issue, include relevant output from /metrics endpoint.
        Run: `curl http://<agent-ip>:9090/metrics | grep kubeadapt`
      render: shell
      placeholder: |
        Paste metrics output here...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information about the problem.
      placeholder: Any additional information...
    validations:
      required: false
