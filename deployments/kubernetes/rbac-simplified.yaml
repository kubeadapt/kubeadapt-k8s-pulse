apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
    version: v2-simplified
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeadapt-ebpf-agent
  labels:
    app: kubeadapt-ebpf-agent
    version: v2-simplified
rules:
***REMOVED*** MINIMAL PERMISSIONS: Only container discovery
***REMOVED*** REMOVED: nodes (no longer need topology.kubernetes.io/zone labels)
***REMOVED*** REMOVED: services (no longer need service mesh topology)
- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list
  ***REMOVED*** REMOVED: watch - No longer need real-time zone updates
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadapt-ebpf-agent
  labels:
    app: kubeadapt-ebpf-agent
    version: v2-simplified
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeadapt-ebpf-agent
subjects:
- kind: ServiceAccount
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
---
***REMOVED*** PodSecurityPolicy (for clusters still using PSP before PSA)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: kubeadapt-ebpf-agent
  labels:
    app: kubeadapt-ebpf-agent
    version: v2-simplified
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: 'runtime/default,unconfined'
    seccomp.security.alpha.kubernetes.io/defaultProfileName: 'unconfined'
    apparmor.security.beta.kubernetes.io/allowedProfileNames: 'runtime/default,unconfined'
    apparmor.security.beta.kubernetes.io/defaultProfileName: 'unconfined'
spec:
  privileged: false  ***REMOVED*** Not using privileged mode
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
  - MKNOD
  - SETUID
  - SETGID
  - FOWNER
  - FSETID
  - KILL
  - SETPCAP
  - NET_BIND_SERVICE
  - SYS_CHROOT
  - SETFCAP
  - AUDIT_WRITE
  - CHOWN
  - DAC_OVERRIDE
  allowedCapabilities:
  - SYS_ADMIN  ***REMOVED*** BPF syscalls (kernels < 5.8)
  - NET_ADMIN  ***REMOVED*** TC/XDP attachment
  - BPF        ***REMOVED*** Modern BPF (5.8+)
  - PERFMON    ***REMOVED*** Modern perf events (5.8+)
  volumes:
  - hostPath
  - emptyDir
  - configMap
  - secret
  - projected
  - downwardAPI
  allowedHostPaths:
  - pathPrefix: "/sys/fs/bpf"
    readOnly: false
  - pathPrefix: "/sys/fs/cgroup"
    readOnly: true
  hostNetwork: true
  hostPID: true
  hostIPC: false
  runAsUser:
    rule: 'RunAsAny'  ***REMOVED*** Must run as root for eBPF
  seLinux:
    rule: 'RunAsAny'
  supplementalGroups:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: true
---
***REMOVED*** Role for PSP usage
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeadapt-ebpf-agent-psp
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
rules:
- apiGroups: ['policy']
  resources: ['podsecuritypolicies']
  verbs: ['use']
  resourceNames: ['kubeadapt-ebpf-agent']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeadapt-ebpf-agent-psp
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
roleRef:
  kind: Role
  name: kubeadapt-ebpf-agent-psp
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
