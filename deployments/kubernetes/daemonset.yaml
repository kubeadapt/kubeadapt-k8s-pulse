apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
    component: network-monitor
spec:
  selector:
    matchLabels:
      app: kubeadapt-ebpf-agent
  template:
    metadata:
      labels:
        app: kubeadapt-ebpf-agent
        component: network-monitor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kubeadapt-ebpf-agent
      hostNetwork: true
      hostPID: true
      containers:
      - name: ebpf-agent
        image: kubeadapt/ebpf-agent:latest
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: EBPF_LOG_LEVEL
          value: "info"
        - name: EBPF_METRICS_PORT
          value: "9090"
        - name: EBPF_COLLECTION_INTERVAL
          value: "10s"
        - name: EBPF_CONTAINER_DISCOVERY
          value: "kubernetes"
        - name: EBPF_BPF_MAP_MAX_ENTRIES
          value: "10240"
        securityContext:
          privileged: false
          capabilities:
            add:
            - CAP_SYS_ADMIN
            - CAP_SYS_PTRACE
            - CAP_NET_ADMIN
            - CAP_NET_RAW
            - CAP_BPF           ***REMOVED*** For kernel 5.8+
            - CAP_PERFMON       ***REMOVED*** For kernel 5.8+
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: false  ***REMOVED*** BPF requires root
          runAsUser: 0
        resources:
          limits:
            cpu: 500m
            memory: 384Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: bpf-maps
          mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        - name: debugfs
          mountPath: /sys/kernel/debug
          readOnly: true
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
      volumes:
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: bpf-maps
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: DirectoryOrCreate
      - name: tmp
        emptyDir: {}
      tolerations:
      ***REMOVED*** Run on all nodes including masters
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      ***REMOVED*** Tolerate unschedulable nodes
      - key: node.kubernetes.io/unschedulable
        operator: Exists
        effect: NoSchedule
      ***REMOVED*** Tolerate not-ready nodes
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      ***REMOVED*** Tolerate unreachable nodes
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      ***REMOVED*** Tolerate disk pressure
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      ***REMOVED*** Tolerate memory pressure
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
      ***REMOVED*** Tolerate PID pressure
      - key: node.kubernetes.io/pid-pressure
        operator: Exists
        effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
---
apiVersion: v1
kind: Service
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
spec:
  selector:
    app: kubeadapt-ebpf-agent
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  clusterIP: None  ***REMOVED*** Headless service for per-pod scraping