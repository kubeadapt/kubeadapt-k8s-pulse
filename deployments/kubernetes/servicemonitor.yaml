apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
    prometheus: kube-prometheus
spec:
  ***REMOVED*** Select the Service created by the DaemonSet
  selector:
    matchLabels:
      app: kubeadapt-ebpf-agent

  ***REMOVED*** Define how to scrape the endpoints
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

    ***REMOVED*** Relabel configs to add useful labels
    relabelings:
    ***REMOVED*** Add node name from pod metadata
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
      action: replace

    ***REMOVED*** Add pod name
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
      action: replace

    ***REMOVED*** Add namespace
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
      action: replace

    ***REMOVED*** Add zone from node labels
    - sourceLabels: [__meta_kubernetes_node_label_topology_kubernetes_io_zone]
      targetLabel: zone
      action: replace

    ***REMOVED*** Add region from node labels
    - sourceLabels: [__meta_kubernetes_node_label_topology_kubernetes_io_region]
      targetLabel: region
      action: replace

    ***REMOVED*** Honor labels from metrics (allow overriding)
    honorLabels: true

  ***REMOVED*** Scrape all namespaces (since DaemonSet runs in kubeadapt-system)
  namespaceSelector:
    matchNames:
    - kubeadapt-system
