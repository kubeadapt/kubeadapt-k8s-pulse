apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
    component: network-monitor
    version: v2-simplified
spec:
  selector:
    matchLabels:
      app: kubeadapt-ebpf-agent
  template:
    metadata:
      labels:
        app: kubeadapt-ebpf-agent
        component: network-monitor
        version: v2-simplified
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        ***REMOVED*** Annotation for change tracking
        config.hash: "simplified-v2"
    spec:
      serviceAccountName: kubeadapt-ebpf-agent
      ***REMOVED*** REMOVED: hostNetwork: true - No longer needed for zone mapping
      ***REMOVED*** We still need hostPID for cgroup access
      hostPID: true
      ***REMOVED*** Use host network namespace for raw packet capture at TC hooks
      hostNetwork: true
      containers:
      - name: ebpf-agent
        image: kubeadapt/ebpf-agent:v2-simplified
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ***REMOVED*** Cluster context for multi-tenant scenarios
        - name: CLUSTER_ID
          value: "{{ .Values.clusterId }}"  ***REMOVED*** Set via Helm
        - name: EBPF_LOG_LEVEL
          value: "info"
        - name: EBPF_METRICS_PORT
          value: "9090"
        ***REMOVED*** Increased collection interval since we're exposing raw connections
        - name: EBPF_COLLECTION_INTERVAL
          value: "15s"
        - name: EBPF_CONTAINER_DISCOVERY
          value: "kubernetes"
        ***REMOVED*** NEW: LRU hash configuration for connection tracking
        - name: EBPF_CONNECTION_MAP_SIZE
          value: "131072"  ***REMOVED*** 131k entries as recommended
        - name: EBPF_CONNECTION_MAP_TYPE
          value: "lru_hash"
        ***REMOVED*** NEW: Cardinality control
        - name: EBPF_MAX_CONNECTIONS_PER_EXPORT
          value: "10000"  ***REMOVED*** Limit to 10k connections per scrape
        - name: EBPF_CONNECTION_STALENESS_TIMEOUT
          value: "120s"  ***REMOVED*** Remove stale connections after 2 minutes
        ***REMOVED*** Disable zone aggregation features
        - name: EBPF_ZONE_AGGREGATION_ENABLED
          value: "false"
        - name: EBPF_ZONE_SYNC_INTERVAL
          value: "0"
        securityContext:
          privileged: false
          capabilities:
            add:
            ***REMOVED*** Core capabilities for eBPF
            - SYS_ADMIN    ***REMOVED*** Required for BPF syscalls on kernels < 5.8
            - NET_ADMIN    ***REMOVED*** Required for TC/XDP attachment
            - BPF          ***REMOVED*** For kernel 5.8+ (graceful fallback if not available)
            - PERFMON      ***REMOVED*** For kernel 5.8+ (graceful fallback if not available)
            ***REMOVED*** REMOVED: SYS_PTRACE - Not needed for connection tracking
            ***REMOVED*** REMOVED: NET_RAW - Not needed without packet parsing
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: false  ***REMOVED*** eBPF requires root
          runAsUser: 0
          ***REMOVED*** SELinux configuration for environments that enforce it
          seLinuxOptions:
            type: spc_t  ***REMOVED*** Super privileged container for eBPF operations
        resources:
          limits:
            cpu: 300m      ***REMOVED*** REDUCED: 55% CPU reduction from eBPF simplification
            memory: 256Mi  ***REMOVED*** REDUCED: Less memory for simpler maps
          requests:
            cpu: 50m       ***REMOVED*** REDUCED: Lower baseline
            memory: 64Mi   ***REMOVED*** REDUCED: Minimal memory footprint
        volumeMounts:
        ***REMOVED*** REMOVED: /sys (not needed without zone discovery)
        ***REMOVED*** REMOVED: /host/proc (not needed without pod IP tracking)
        ***REMOVED*** KEPT: Essential mounts for eBPF
        - name: bpf-maps
          mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        ***REMOVED*** REMOVED: debugfs - Not required for production
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
      volumes:
      - name: bpf-maps
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: tmp
        emptyDir:
          medium: Memory  ***REMOVED*** Use tmpfs for better performance
          sizeLimit: 128Mi
      tolerations:
      ***REMOVED*** Run on all nodes including masters
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      ***REMOVED*** Tolerate unschedulable nodes
      - key: node.kubernetes.io/unschedulable
        operator: Exists
        effect: NoSchedule
      ***REMOVED*** Tolerate not-ready nodes (with longer grace period)
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      ***REMOVED*** Tolerate unreachable nodes
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      ***REMOVED*** Tolerate resource pressure
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/pid-pressure
        operator: Exists
        effect: NoSchedule
      ***REMOVED*** Tolerate network unavailable (for CNI startup)
      - key: node.kubernetes.io/network-unavailable
        operator: Exists
        effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
---
apiVersion: v1
kind: Service
metadata:
  name: kubeadapt-ebpf-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-ebpf-agent
spec:
  selector:
    app: kubeadapt-ebpf-agent
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  clusterIP: None  ***REMOVED*** Headless service for per-pod scraping
  publishNotReadyAddresses: true  ***REMOVED*** Allow scraping during startup
