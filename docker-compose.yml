services:
  ***REMOVED*** BPF Builder service - for compiling BPF programs on macOS
  bpf-builder:
    image: kubeadapt/bpf-builder:latest
    build:
      context: .
      dockerfile: Dockerfile.bpf-builder
    container_name: kubeadapt-bpf-builder
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: |
      bash -c "
        echo 'Building BPF programs...'
        cd internal/bpf
        bpf2go -cc clang-14 \
          -cflags '-O2 -g -Wall -Werror' \
          -target amd64,arm64 \
          -type container_net_stats,connection_key,connection_stats \
          network ../../bpf/network_monitor.c
        bpf2go -cc clang-14 \
          -cflags '-O2 -g -Wall -Werror' \
          -target amd64,arm64 \
          -type connection_key,connection_stats \
          connection ../../bpf/connection_tracker.c
        echo 'BPF programs built successfully!'
      "

  ***REMOVED*** eBPF Agent service - Production configuration
  ebpf-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: kubeadapt-ebpf-agent
    privileged: true  ***REMOVED*** Required for eBPF
    network_mode: host  ***REMOVED*** Required to monitor host network
    pid: host  ***REMOVED*** Required to access host processes
    environment:
      ***REMOVED*** Configuration
      EBPF_METRICS_PORT: 9090
      EBPF_LOG_LEVEL: ${LOG_LEVEL:-info}
      EBPF_LOG_FORMAT: json
      EBPF_COLLECTION_INTERVAL: 10s
      EBPF_BATCH_SIZE: 100
      EBPF_CONTAINER_DISCOVERY: proc
      EBPF_PROC_PATH: /host/proc
      EBPF_BPF_MAP_MAX_ENTRIES: 10240
      EBPF_DEBUG: ${DEBUG:-false}
      NODE_NAME: ${NODE_NAME:-local-dev}
    volumes:
      ***REMOVED*** Mount host filesystem for container discovery
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      ***REMOVED*** Mount BPF filesystem
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/kernel/debug:/sys/kernel/debug:ro
    cap_add:
      - SYS_ADMIN  ***REMOVED*** Required for BPF operations
      - NET_ADMIN  ***REMOVED*** Required for network operations
      - SYS_RESOURCE  ***REMOVED*** Required for resource limits
      - BPF  ***REMOVED*** Required for BPF operations (kernel 5.8+)
      - PERFMON  ***REMOVED*** Required for performance monitoring (kernel 5.8+)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      bpf-builder:
        condition: service_completed_successfully

  ***REMOVED*** eBPF Agent Development service - with hot reload
  ebpf-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kubeadapt-ebpf-dev
    privileged: true
    network_mode: host
    pid: host
    environment:
      ***REMOVED*** Development configuration
      EBPF_METRICS_PORT: 9090
      EBPF_LOG_LEVEL: debug
      EBPF_LOG_FORMAT: text
      EBPF_COLLECTION_INTERVAL: 5s
      EBPF_DEBUG: true
      NODE_NAME: local-dev
    volumes:
      ***REMOVED*** Source code for hot reload
      - .:/workspace
      ***REMOVED*** Host filesystem
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      ***REMOVED*** BPF filesystem
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/kernel/debug:/sys/kernel/debug:rw
    working_dir: /workspace
    command: air -c .air.toml
    ports:
      - "9090:9090"

  ***REMOVED*** Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: kubeadapt-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"  ***REMOVED*** Different port to avoid conflict
    depends_on:
      - ebpf-agent
    restart: unless-stopped

  ***REMOVED*** Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: kubeadapt-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  ***REMOVED*** Node exporter for system metrics (optional)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: kubeadapt-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)'
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    network_mode: host
    pid: host
    restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  default:
    name: kubeadapt
    driver: bridge