***REMOVED*** golangci-lint configuration for eBPF Agent
***REMOVED*** Compatible with golangci-lint v1.x

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

issues:
  exclude-dirs:
    - vendor
    - third_party
    - test/unit

  exclude-files:
    - ".*_bpfel\\.go$"
    - ".*_bpfeb\\.go$"

  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    ***REMOVED*** Exclude all linters for generated BPF code
    - path: "_bpfe[lb]\\.go"
      linters:
        - govet
        - errcheck
        - staticcheck
        - unused
        - ineffassign

    ***REMOVED*** Allow unsafe and complex code in BPF loader
    - path: "internal/bpf/"
      linters:
        - gosec
        - gocyclo
        - cyclop
        - errcheck

    ***REMOVED*** Test files have different requirements
    - path: "_test\\.go"
      linters:
        - errcheck
        - goconst
        - unused
        - funlen
        - dupl

    ***REMOVED*** E2E test helpers and internal system
    - path: "test/e2e/"
      linters:
        - errcheck
        - goconst
        - unused

    ***REMOVED*** Internal system utilities (patch version parsing is optional)
    - path: "internal/system/"
      linters:
        - errcheck

    ***REMOVED*** Temporarily exclude unit tests that need API updates
    - path: "test/unit/"
      linters:
        - govet
        - errcheck
        - staticcheck
        - unused
        - ineffassign

linters:
  disable-all: true
  enable:
    ***REMOVED*** Critical linters (must-have)
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

    ***REMOVED*** Code quality
    - misspell
    - goconst
    - unconvert
    - whitespace

    ***REMOVED*** Bug detection
    - bodyclose

    ***REMOVED*** Formatting
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/kubeadapt/ebpf-agent

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
      - unusedwrite

  staticcheck:
    checks: ["all"]

  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close

  misspell:
    locale: US

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
