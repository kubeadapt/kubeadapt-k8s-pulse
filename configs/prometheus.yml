global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the kubeadapt-k8s-pulse service (used by make run-local)
  # Uses Docker Compose service name for DNS resolution (bridge networking)
  - job_name: 'kubeadapt-k8s-pulse'
    static_configs:
      - targets: ['kubeadapt-k8s-pulse:9090']  # Docker service name (bridge networking)
        labels:
          component: 'kubeadapt-k8s-pulse'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s