global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  ***REMOVED*** Scrape the production ebpf-agent service (used by make run-local)
  ***REMOVED*** Uses Docker Compose service name for DNS resolution (bridge networking)
  - job_name: 'ebpf-agent'
    static_configs:
      - targets: ['ebpf-agent:9090']  ***REMOVED*** Docker service name (bridge networking)
        labels:
          component: 'ebpf-agent'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 10s