***REMOVED*** Traffic generation pods for E2E testing
***REMOVED*** These pods are used to generate network traffic with proper zone labels
***REMOVED*** for validating cross-AZ and same-AZ traffic detection
---
apiVersion: v1
kind: Namespace
metadata:
  name: traffic-test
---
***REMOVED*** Traffic Generator Pod A - Zone us-west-2a
***REMOVED*** Used as source for cross-zone traffic testing
apiVersion: v1
kind: Pod
metadata:
  name: traffic-gen-a
  namespace: traffic-test
  labels:
    app: traffic-gen-a
    zone: us-west-2a
    traffic-role: source
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-west-2a
  tolerations:
    ***REMOVED*** Allow scheduling on control-plane node
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
  containers:
    - name: generator
      image: nginx:alpine
      ports:
        - containerPort: 80
          name: http
      resources:
        requests:
          memory: "64Mi"
          cpu: "500m"
        limits:
          memory: "128Mi"
          cpu: "2000m"
      ***REMOVED*** Install curl and other tools for traffic generation
      command: ["/bin/sh"]
      args:
        - "-c"
        - |
          apk add --no-cache curl wget netcat-openbsd &&
          nginx -g 'daemon off;'
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
---
***REMOVED*** Service for Traffic Generator A
apiVersion: v1
kind: Service
metadata:
  name: traffic-gen-a-svc
  namespace: traffic-test
  labels:
    app: traffic-gen-a
spec:
  selector:
    app: traffic-gen-a
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: ClusterIP
---
