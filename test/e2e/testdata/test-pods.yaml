***REMOVED*** Test pods for E2E testing
***REMOVED*** These pods will generate cross-node traffic for validation
apiVersion: v1
kind: Namespace
metadata:
  name: test
---
***REMOVED*** Test Pod A - Will be scheduled on zone us-west-2a (control-plane)
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-a
  namespace: test
  labels:
    app: test-pod-a
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-west-2a
  tolerations:
    ***REMOVED*** Allow scheduling on control-plane node
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
          name: http
      ***REMOVED*** Add curl for making requests
      command: ["/bin/sh"]
      args:
        - "-c"
        - |
          apk add --no-cache curl &&
          nginx -g 'daemon off;'
---
***REMOVED*** Service for Pod A
apiVersion: v1
kind: Service
metadata:
  name: test-service-a
  namespace: test
spec:
  selector:
    app: test-pod-a
  ports:
    - port: 80
      targetPort: 80
      name: http
---
***REMOVED*** Test Pod B - Will be scheduled on zone us-west-2b (different from A)
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-b
  namespace: test
  labels:
    app: test-pod-b
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-west-2b
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
          name: http
      command: ["/bin/sh"]
      args:
        - "-c"
        - |
          apk add --no-cache curl &&
          nginx -g 'daemon off;'
---
***REMOVED*** Service for Pod B
apiVersion: v1
kind: Service
metadata:
  name: test-service-b
  namespace: test
spec:
  selector:
    app: test-pod-b
  ports:
    - port: 80
      targetPort: 80
      name: http
---
***REMOVED*** Test Pod C - Will be scheduled on same zone as Pod B (us-west-2b)
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-c
  namespace: test
  labels:
    app: test-pod-c
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-west-2b
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
          name: http
      command: ["/bin/sh"]
      args:
        - "-c"
        - |
          apk add --no-cache curl &&
          nginx -g 'daemon off;'
---
***REMOVED*** Service for Pod C
apiVersion: v1
kind: Service
metadata:
  name: test-service-c
  namespace: test
spec:
  selector:
    app: test-pod-c
  ports:
    - port: 80
      targetPort: 80
      name: http
---
***REMOVED*** Test Pod D - hostNetwork:true pod for validating filter mode behavior
***REMOVED*** This pod uses the host's network namespace (hostNetwork: true)
***REMOVED*** Default filter mode should STILL track this pod correctly (cgroup-based filtering)
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-d-hostnetwork
  namespace: test
  labels:
    app: test-pod-d-hostnetwork
spec:
  hostNetwork: true  ***REMOVED*** Pod uses host's network namespace
  nodeSelector:
    topology.kubernetes.io/zone: us-west-2b
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 8080  ***REMOVED*** Use different port to avoid host port conflicts
          name: http
      command: ["/bin/sh"]
      args:
        - "-c"
        - |
          apk add --no-cache curl &&
          ***REMOVED*** Listen on port 8080 instead of 80 to avoid conflicts with host
          sed -i 's/listen.*80;/listen 8080;/' /etc/nginx/conf.d/default.conf &&
          nginx -g 'daemon off;'
---
***REMOVED*** Service for Pod D (hostNetwork pod)
***REMOVED*** Note: For hostNetwork pods, Service uses node IP instead of pod IP
apiVersion: v1
kind: Service
metadata:
  name: test-service-d-hostnetwork
  namespace: test
spec:
  selector:
    app: test-pod-d-hostnetwork
  ports:
    - port: 8080
      targetPort: 8080
      name: http
