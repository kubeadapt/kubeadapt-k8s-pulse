# KubeAdapt eBPF Agent RBAC for E2E Tests
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeadapt-kubeadapt-k8s-pulse
  namespace: kubeadapt-system
  labels:
    app.kubernetes.io/name: kubeadapt
    app.kubernetes.io/component: kubeadapt-k8s-pulse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeadapt-kubeadapt-k8s-pulse
  labels:
    app.kubernetes.io/name: kubeadapt
    app.kubernetes.io/component: kubeadapt-k8s-pulse
rules:
  # Pod information for connection-to-pod correlation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Node information for host network correlation
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Namespace information for filtering
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Service information for service-level metrics
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadapt-kubeadapt-k8s-pulse
  labels:
    app.kubernetes.io/name: kubeadapt
    app.kubernetes.io/component: kubeadapt-k8s-pulse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeadapt-kubeadapt-k8s-pulse
subjects:
  - kind: ServiceAccount
    name: kubeadapt-kubeadapt-k8s-pulse
    namespace: kubeadapt-system
