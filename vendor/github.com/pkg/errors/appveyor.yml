version: build-{build}.{branch}

clone_folder: C:\gopath\src\github.com\pkg\errors
shallow_clone: true ***REMOVED*** for startup speed

environment:
  GOPATH: C:\gopath

platform:
  - x64

***REMOVED*** http://www.appveyor.com/docs/installed-software
install:
  ***REMOVED*** some helpful output for debugging builds
  - go version
  - go env
  ***REMOVED*** pre-installed MinGW at C:\MinGW is 32bit only
  ***REMOVED*** but MSYS2 at C:\msys64 has mingw64
  - set PATH=C:\msys64\mingw64\bin;%PATH%
  - gcc --version
  - g++ --version

build_script:
  - go install -v ./...

test_script:
  - set PATH=C:\gopath\bin;%PATH%
  - go test -v ./...

***REMOVED***artifacts:
***REMOVED***  - path: '%GOPATH%\bin\*.exe'
deploy: off
