run:
  deadline: 5m

linters:
  disable-all: true
  enable:
    ***REMOVED***- bodyclose
    ***REMOVED*** - deadcode ! deprecated since v1.49.0; replaced by 'unused'
    ***REMOVED***- depguard
    ***REMOVED***- dogsled
    ***REMOVED***- dupl
    - errcheck
    ***REMOVED***- exhaustive
    ***REMOVED***- funlen
    ***REMOVED***- gochecknoinits
    - goconst
    - gocritic
    ***REMOVED***- gocyclo
    - gofmt
    - goimports
    ***REMOVED***- gomnd
    ***REMOVED***- goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    ***REMOVED***- lll
    - misspell
    ***REMOVED***- nakedret
    ***REMOVED***- noctx
    - nolintlint
    ***REMOVED***- rowserrcheck
    ***REMOVED***- scopelint
    - staticcheck
    ***REMOVED***- structcheck ! deprecated since v1.49.0; replaced by 'unused'
    - stylecheck
    ***REMOVED***- typecheck
    - unconvert
    ***REMOVED***- unparam
    - unused
    ***REMOVED*** - varcheck ! deprecated since v1.49.0; replaced by 'unused'
    ***REMOVED***- whitespace
  fast: false
