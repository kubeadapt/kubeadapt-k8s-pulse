output:
  ***REMOVED*** Make output more digestible with quickfix in vim/emacs/etc.
  sort-results: true
  print-issued-lines: false

linters:
  ***REMOVED*** We'll track the golangci-lint default linters manually
  ***REMOVED*** instead of letting them change without our control.
  disable-all: true
  enable:
    ***REMOVED*** golangci-lint defaults:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    ***REMOVED*** Our own extras:
    - gofumpt
    - nolintlint ***REMOVED*** lints nolint directives
    - revive

linters-settings:
  govet:
    ***REMOVED*** These govet checks are disabled by default, but they're useful.
    enable:
      - niliness
      - reflectvaluecompare
      - sortslice
      - unusedwrite

  errcheck:
    exclude-functions:
      ***REMOVED*** These methods can not fail.
      ***REMOVED*** They operate on an in-memory buffer.
      - (*go.uber.org/zap/buffer.Buffer).Write
      - (*go.uber.org/zap/buffer.Buffer).WriteByte
      - (*go.uber.org/zap/buffer.Buffer).WriteString

      - (*go.uber.org/zap/zapio.Writer).Close
      - (*go.uber.org/zap/zapio.Writer).Sync
      - (*go.uber.org/zap/zapio.Writer).Write
      ***REMOVED*** Write to zapio.Writer cannot fail,
      ***REMOVED*** so io.WriteString on it cannot fail.
      - io.WriteString(*go.uber.org/zap/zapio.Writer)

      ***REMOVED*** Writing a plain string to a fmt.State cannot fail.
      - io.WriteString(fmt.State)

issues:
  ***REMOVED*** Print all issues reported by all linters.
  max-issues-per-linter: 0
  max-same-issues: 0

  ***REMOVED*** Don't ignore some of the issues that golangci-lint considers okay.
  ***REMOVED*** This includes documenting all exported entities.
  exclude-use-default: false

  exclude-rules:
    ***REMOVED*** Don't warn on unused parameters.
    ***REMOVED*** Parameter names are useful; replacing them with '_' is undesirable.
    - linters: [revive]
      text: 'unused-parameter: parameter \S+ seems to be unused, consider removing or renaming it as _'

    ***REMOVED*** staticcheck already has smarter checks for empty blocks.
    ***REMOVED*** revive's empty-block linter has false positives.
    ***REMOVED*** For example, as of writing this, the following is not allowed.
    ***REMOVED***   for foo() { }
    - linters: [revive]
      text: 'empty-block: this block is empty, you can remove it'

    ***REMOVED*** Ignore logger.Sync() errcheck failures in example_test.go
    ***REMOVED*** since those are intended to be uncomplicated examples.
    - linters: [errcheck]
      path: example_test.go
      text: 'Error return value of `logger.Sync` is not checked'
