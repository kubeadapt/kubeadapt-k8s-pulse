coverage:
  range: 80..100
  round: down
  precision: 2

  status:
    project:                   ***REMOVED*** measuring the overall project coverage
      default:                 ***REMOVED*** context, you can create multiple ones with custom titles
        enabled: yes           ***REMOVED*** must be yes|true to enable this status
        target: 100            ***REMOVED*** specify the target coverage for each commit status
                               ***REMOVED***   option: "auto" (must increase from parent commit or pull request base)
                               ***REMOVED***   option: "X%" a static target percentage to hit
        if_not_found: success  ***REMOVED*** if parent is not found report status as success, error, or failure
        if_ci_failed: error    ***REMOVED*** if ci fails report status as success, error, or failure

